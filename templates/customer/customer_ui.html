<!DOCTYPE html>
<html lang="en">
<head>
    <!-- General website setup stuff. Declaring the stylesheet and JS imports. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='customer/customer_stylesheet.css') }}">
    <script src="{{ url_for('static', filename='customer/customer_app.js') }}"></script>
</head>
<body>
    <main>
        <h1>Customer Interface</h1>
        <p>Order your items here.</p>

        <!-- Anything that the customer orders should be displayed here. -->
        <div class="cart">

            <!-- TODO: These need to be updated with the actual drink names. -->
            <!-- TODO: The drink IDs need to be replaced with the actual Menu Item IDs. -->
            <div class="menu_item_container">

                <button type="button" onclick="add_item_to_cart('101')">Ancestral Samurai Sakura Tea</button>
                <button type="button" onclick="add_item_to_cart('102')">Iced Yurei Matcha</button>
                <button type="button" onclick="add_item_to_cart('103')">Patriotic Cold Brew</button>
                <button type="button" onclick="add_item_to_cart('104')">Bethany's Ballistic Boba Bash</button>
                <button type="button" onclick="add_item_to_cart('105')">Dr. Taele's Signature Smoothie</button>
                <button type="button" onclick="add_item_to_cart('106')">Anaya's Dubious Dubai Chocolate Milkshake</button>
            </div>
            
            <div class="cart_centered">
                <div class="cart_operations" aria-label="Cart actions">
                    <button type="button" onclick="clear_cart()">Clear Cart</button>
                    <button type="button">Submit Order</button>
                </div>

                <!-- This is the DIV that is used to list the cart items. -->
                <!-- Used in "customer_app.js" -->
                <div id="cart_items" aria-live="polite"></div>

                <h2 id="total_price" aria-live="polite">Total Price: $0.00</h2>
            </div>

        </div>
    </main>
</body>
</html>
